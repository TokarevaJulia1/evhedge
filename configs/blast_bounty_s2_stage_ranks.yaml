# stage_ranks: BLAST Bounty 2026 Season 2 (CS2).
#
# Все 32 команды -> n=5: Ro32/Ro16 (этап 1, Bo3 на вылет) + QF/SF (этап 2,
# Bo3) + гранд-финал (Bo5) = 5 побед до титула для КАЖДОЙ из 32 команд --
# впервые в этом проекте однородное покрытие с самого первого раунда.
# Список и канонические имена взяты из фактического первого `pull` по
# winner-борду (blast-bounty-2026-season-2-winner-20260709030103861,
# проверено 2026-07-16), не из промпта -- см. team_aliases.yaml для
# "Spirit"/"Falcons"/"Aurora" (короткие CS-борд написания, канон -- уже
# существующее имя организации из дотовского словаря).
#
# ПРОТОКОЛ ОБНОВЛЕНИЯ -- важнее самого файла (урок EWC: волна QF ушла
# market-only, потому что книги следующего раунда листингуются за минуты
# после последнего резолва раунда, а карту поправили позже):
#   - править В МОМЕНТ последнего резолва раунда, не через час и не завтра;
#   - все выжившие раунда -> n-1 (после Ro32/Ro16 -> 3 [этап 2 без Ro32/16],
#     после QF/SF -> 2, после подтверждения финалистов -> 1);
#   - вылетевших просто убрать из файла -- отсутствие честно даёт NULL,
#     если их рынок почему-то снова всплывёт;
#   - сверка следующего цикла -- `evhedge autopredict status`, колонка
#     "с моделью" должна начать расти сразу после правки.
#
# Сгенерировано `evhedge stageranks init --db data/blast2026.db
# --tournament "BLAST Bounty 2026 Season 2" --n 5`.
