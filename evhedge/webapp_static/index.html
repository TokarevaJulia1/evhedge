<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roll-Over Chain — цепочка сделок</title>
<style>
  :root {
    --bg: #0B0F17;
    --surface: #161B22;
    --border: #242C38;
    --text: #F0F3F7;
    --muted: #8B949E;
    --accent: #2DD4BF;
    --accent-dim: #2DD4BF33;
    --profit: #3FDB92;
    --loss: #E5484D;
    --loss-dim: #E5484D22;
    --font-ui: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif;
    --font-num: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
  body { padding: 40px 20px 80px; }
  .page { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; }
  .eyebrow { color: var(--muted); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  label.field-label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }

  input[type="text"], input[type="number"], select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    padding: 9px 11px; color: var(--text); font-family: var(--font-num); font-variant-numeric: tabular-nums;
    font-size: 14px; transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input::placeholder { color: #4b525c; }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  input:disabled, select:disabled { opacity: 0.35; cursor: not-allowed; }
  input[type="number"] { text-align: right; }

  button { font-family: var(--font-ui); cursor: pointer; }
  button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-accent {
    display: inline-flex; align-items: center; gap: 7px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); border-radius: 7px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    transition: background 0.15s ease; white-space: nowrap;
  }
  .btn-accent:hover { background: var(--accent-dim); }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-remove {
    background: none; border: none; color: var(--muted); padding: 6px; border-radius: 6px;
    display: inline-flex; transition: color 0.15s ease, background 0.15s ease;
  }
  .btn-remove:hover { color: var(--loss); background: var(--loss-dim); }

  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px;
    padding: 4px 9px; font-size: 12px; transition: border-color 0.15s ease, color 0.15s ease;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .strategy-name {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text);
    font-family: var(--font-ui); font-size: 26px; font-weight: 700; text-wrap: balance; padding: 6px 2px 10px;
  }
  .strategy-name:focus { outline: none; border-bottom-color: var(--accent); }

  /* --- Polymarket connect card --- */
  .connect-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
  .connect-row .addr-field { flex: 1; min-width: 260px; }
  .conn-status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; }
  .conn-status.err { color: var(--loss); }

  .positions-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .position-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px;
  }
  .position-row.resolved { opacity: 0.55; }
  .position-row .pos-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .position-row .pos-title { color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .position-row .pos-sub { color: var(--muted); font-family: var(--font-num); font-variant-numeric: tabular-nums; font-size: 12px; }
  .badge-redeemable {
    flex-shrink: 0; font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase;
    color: #E3A73F; border: 1px solid #E3A73F; border-radius: 4px; padding: 1px 6px; font-weight: 600;
  }

  /* --- params --- */
  .params-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
  .params-grid-single { grid-template-columns: minmax(0, 320px); }

  /* --- table --- */
  .table-head-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 880px; }
  thead th {
    text-align: left; color: var(--muted); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 600; padding: 0 10px 10px 0; border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid #1c222c; }
  tbody tr.locked { opacity: 0.4; }
  tbody td {
    padding: 10px 10px 10px 0; vertical-align: middle; font-family: var(--font-num);
    font-variant-numeric: tabular-nums; font-size: 14px;
  }
  td.idx { color: var(--muted); width: 26px; }
  td.coef-cell input { max-width: 110px; }
  td.match-cell input { max-width: 220px; text-align: left; font-family: var(--font-ui); }
  td.status-cell select { max-width: 148px; }
  .amount { font-weight: 600; }
  .amount.profit { color: var(--profit); }
  .amount.loss { color: var(--loss); }
  .implied-cell { color: var(--muted); font-size: 13px; }
  .implied-cell b { color: var(--text); font-weight: 600; }
  .lock-note { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-family: var(--font-ui); font-size: 13px; }
  .status-pill-completed { border-color: #3FDB9255 !important; color: var(--profit) !important; }
  .status-pill-pending { border-color: #E3A73F55 !important; color: #E3A73F !important; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px 0; font-family: var(--font-ui); }
  .live-tag {
    display: inline-block; margin-left: 6px; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 1px 5px;
  }

  /* --- totals --- */
  .totals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .totals-grid-single { grid-template-columns: minmax(0, 360px); }
  .total-card .eyebrow { margin-bottom: 10px; }
  .total-figure { font-family: var(--font-num); font-variant-numeric: tabular-nums; font-size: 28px; font-weight: 700; }
  .total-figure.profit { color: var(--profit); }
  .total-figure.loss { color: var(--loss); }
  .total-card.pnl { border-width: 2px; }
  .total-card.pnl.is-profit { border-color: #3FDB9270; }
  .total-card.pnl.is-loss { border-color: #E5484D70; }

  @media (max-width: 720px) {
    .params-grid, .totals-grid { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="page">

  <header>
    <label class="field-label" for="strategyName">Название стратегии / цепочки</label>
    <input id="strategyName" class="strategy-name" type="text" value="Без названия — новая цепочка" placeholder="Название стратегии / цепочки" />
  </header>

  <!-- Подключение к Polymarket -->
  <section class="card">
    <div class="eyebrow">Подключение к Polymarket (публичный адрес кошелька)</div>
    <div class="connect-row">
      <div class="addr-field">
        <label class="field-label" for="walletAddress">Адрес кошелька (0x...)</label>
        <input id="walletAddress" type="text" placeholder="0x..." />
      </div>
      <button class="btn-accent" id="fetchPositionsBtn">Обновить позиции</button>
    </div>
    <div class="conn-status" id="connStatus"></div>
    <div class="positions-list" id="positionsList"></div>
  </section>

  <!-- Потенциальные ноги турнира (PandaScore) -->
  <section class="card">
    <div class="eyebrow">Потенциальные ноги турнира (PandaScore)</div>
    <div class="connect-row">
      <div class="addr-field">
        <label class="field-label" for="bracketTournamentId">PandaScore Tournament ID</label>
        <input id="bracketTournamentId" type="text" placeholder="напр. 21474" />
      </div>
      <button class="btn-accent" id="fetchBracketBtn">Загрузить сетку</button>
    </div>
    <div class="conn-status" id="bracketStatus"></div>
    <div class="positions-list" id="bracketList"></div>
  </section>

  <!-- Базовые параметры -->
  <section class="card">
    <div class="eyebrow">Базовые параметры</div>
    <div class="params-grid params-grid-single">
      <div>
        <label class="field-label" for="initialCapital">Начальный капитал ($)</label>
        <input id="initialCapital" type="number" step="0.01" value="1000" />
      </div>
    </div>
  </section>

  <!-- Таблица цепочки -->
  <section class="card">
    <div class="table-head-row">
      <div class="eyebrow">Цепочка сделок (Roll-Over)</div>
      <button class="btn-accent" id="addRowBtn">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Добавить этап
      </button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>№</th>
            <th>Матч</th>
            <th>Коэффициент доходности</th>
            <th>Сумма сделки ($)</th>
            <th>Чистый доход ($)</th>
            <th>Баланс после ($)</th>
            <th>Импл. цена / Шардов</th>
            <th>Статус</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rowsBody"></tbody>
      </table>
    </div>
  </section>

  <!-- Итоги -->
  <section class="totals-grid totals-grid-single">
    <div class="card total-card pnl" id="pnlCard">
      <div class="eyebrow">Итоговый PnL (чистая прибыль цепочки)</div>
      <div class="total-figure" id="netPnl">$0.00</div>
    </div>
  </section>

</div>

<script>
  const STATUS = { COMPLETED: "completed", PENDING: "pending" };

  // Каждая строка может нести привязанную живую позицию Polymarket
  // (asset = CLOB token id) -- только для строки, реально загруженной
  // из открытой позиции; гипотетические будущие этапы её не имеют.
  let rows = [
    { id: 1, coefficient: 0.85, status: STATUS.COMPLETED, asset: null, liveNote: null, matchLabel: "" },
    { id: 2, coefficient: 0.6, status: STATUS.PENDING, asset: null, liveNote: null, matchLabel: "" },
  ];
  let nextId = 3;

  function escapeAttr(s) {
    return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  const moneyFmt = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  function formatMoney(value, withSign) {
    if (value === null || value === undefined || Number.isNaN(value)) return "—";
    const sign = value < 0 ? "-" : (withSign && value > 0 ? "+" : "");
    return sign + "$" + moneyFmt.format(Math.abs(value));
  }

  const $ = (id) => document.getElementById(id);
  const initialCapitalEl = $("initialCapital");
  const rowsBody = $("rowsBody");
  const strategyNameEl = $("strategyName");

  // ---------- расчёт цепочки ----------

  function computeChain() {
    const initialCapital = parseFloat(initialCapitalEl.value) || 0;
    let carryBalance = initialCapital;
    let unlocked = true;

    return rows.map((row) => {
      const reachable = unlocked;
      const tradeAmount = reachable ? carryBalance : null;
      const netProfit = reachable ? tradeAmount * row.coefficient : null;
      const balanceAfter = reachable ? tradeAmount + netProfit : null;

      // Подразумеваемая цена входа при выплате $1/акция:
      // netProfit = tradeAmount*coef  =>  d = 1+coef (decimal odds),
      // impliedPrice = 1/d, shares = tradeAmount/impliedPrice = balanceAfter.
      const impliedPrice = reachable && (1 + row.coefficient) > 0 ? 1 / (1 + row.coefficient) : null;
      const shares = reachable ? balanceAfter : null;

      if (reachable) {
        carryBalance = balanceAfter;
        if (row.status !== STATUS.COMPLETED) unlocked = false;
      } else {
        unlocked = false;
      }
      return Object.assign({}, row, { reachable, tradeAmount, netProfit, balanceAfter, impliedPrice, shares });
    });
  }

  function render() {
    const computed = computeChain();

    rowsBody.innerHTML = "";
    if (computed.length === 0) {
      rowsBody.innerHTML = '<tr class="empty-row"><td colspan="9">Цепочка пуста — добавьте первый этап.</td></tr>';
    }

    computed.forEach((row, idx) => {
      const tr = document.createElement("tr");
      if (!row.reachable) tr.classList.add("locked");

      const lockNote = '<span class="lock-note"><svg width="13" height="13" viewBox="0 0 20 20" fill="none"><rect x="4.5" y="9" width="11" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M6.5 9V6.5a3.5 3.5 0 017 0V9" stroke="currentColor" stroke-width="1.4"/></svg>ожидание</span>';

      const profitClass = row.reachable ? (row.netProfit >= 0 ? "profit" : "loss") : "";
      const statusPillClass = row.status === STATUS.COMPLETED ? "status-pill-completed" : "status-pill-pending";

      const impliedCell = row.reachable && row.impliedPrice !== null
        ? `<span class="implied-cell">${(row.impliedPrice * 100).toFixed(1)}¢ → <b>${Math.round(row.shares).toLocaleString()}</b> шт.</span>`
        : '<span class="implied-cell">—</span>';

      const liveBtn = row.asset
        ? `<button class="btn-ghost" data-live-id="${row.id}" title="Подтянуть текущий bid/ask с реального ордербука">книга</button>`
        : "";
      const liveNote = row.liveNote ? `<span class="live-tag" title="Реальный ордербук">${row.liveNote}</span>` : "";

      tr.innerHTML = `
        <td class="idx">${idx + 1}</td>
        <td class="match-cell">
          <input type="text" data-id="${row.id}" data-field="matchLabel" value="${escapeAttr(row.matchLabel || "")}" ${row.reachable ? "" : "disabled"} placeholder="команда А vs команда Б" />
        </td>
        <td class="coef-cell">
          <input type="number" step="0.01" data-id="${row.id}" data-field="coefficient" value="${row.coefficient}" ${row.reachable ? "" : "disabled"} placeholder="0.85" />
        </td>
        <td class="amount">${row.reachable ? formatMoney(row.tradeAmount) : lockNote}</td>
        <td class="amount ${profitClass}">${row.reachable ? formatMoney(row.netProfit, true) : "—"}</td>
        <td class="amount">${row.reachable ? formatMoney(row.balanceAfter) : "—"}</td>
        <td>${impliedCell} ${liveBtn} ${liveNote}</td>
        <td class="status-cell">
          <select data-id="${row.id}" data-field="status" class="${statusPillClass}" ${row.reachable ? "" : "disabled"}>
            <option value="${STATUS.COMPLETED}" ${row.status === STATUS.COMPLETED ? "selected" : ""}>Завершено</option>
            <option value="${STATUS.PENDING}" ${row.status === STATUS.PENDING ? "selected" : ""}>В ожидании</option>
          </select>
        </td>
        <td>
          <button class="btn-remove" data-id="${row.id}" title="Удалить этап">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </td>
      `;
      rowsBody.appendChild(tr);
    });

    // Хеджа как отдельной статьи расходов в стратегии нет -- каждый этап
    // цепочки САМ является хеджем предыдущего (см. чат: перекат = ставка
    // на следующий матч из уже гарантированного профита). PnL = сумма
    // чистого дохода завершённых этапов, без вычитаемых посторонних сумм.
    const netPnl = computed.reduce((sum, r) => (r.reachable && r.status === STATUS.COMPLETED) ? sum + r.netProfit : sum, 0);

    const pnlEl = $("netPnl");
    pnlEl.textContent = formatMoney(netPnl, true);
    pnlEl.className = "total-figure " + (netPnl >= 0 ? "profit" : "loss");
    const pnlCard = $("pnlCard");
    pnlCard.classList.remove("is-profit", "is-loss");
    pnlCard.classList.add(netPnl >= 0 ? "is-profit" : "is-loss");

    rowsBody.querySelectorAll("input[data-field], select[data-field]").forEach((el) => {
      el.addEventListener("change", (e) => {
        const id = parseFloat(e.target.dataset.id);
        const field = e.target.dataset.field;
        const row = rows.find((r) => r.id === id);
        if (!row) return;
        row[field] = field === "coefficient" ? (parseFloat(e.target.value) || 0) : e.target.value;
        render();
      });
    });
    rowsBody.querySelectorAll(".btn-remove").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = parseFloat(btn.dataset.id);
        rows = rows.filter((r) => r.id !== id);
        render();
      });
    });
    rowsBody.querySelectorAll("[data-live-id]").forEach((btn) => {
      btn.addEventListener("click", () => fetchLiveBook(parseFloat(btn.dataset.liveId)));
    });
  }

  $("addRowBtn").addEventListener("click", () => {
    rows.push({ id: nextId++, coefficient: 0, status: STATUS.PENDING, asset: null, liveNote: null, matchLabel: "" });
    render();
  });

  initialCapitalEl.addEventListener("input", render);

  // ---------- Polymarket: живые позиции ----------

  const connStatus = $("connStatus");
  const positionsList = $("positionsList");
  const walletAddressEl = $("walletAddress");
  const fetchBtn = $("fetchPositionsBtn");

  const savedAddress = localStorage.getItem("evhedge_wallet_address");
  if (savedAddress) walletAddressEl.value = savedAddress;

  function pct(x) { return x === null || x === undefined ? "—" : (x * 100).toFixed(1) + "¢"; }

  async function fetchPositions() {
    const address = walletAddressEl.value.trim();
    if (!address) {
      connStatus.textContent = "Введите адрес кошелька (0x...)";
      connStatus.classList.add("err");
      return;
    }
    localStorage.setItem("evhedge_wallet_address", address);
    connStatus.classList.remove("err");
    connStatus.textContent = "Загрузка...";
    fetchBtn.disabled = true;
    try {
      const resp = await fetch(`/api/positions?address=${encodeURIComponent(address)}`);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "неизвестная ошибка");
      renderPositions(data);
      const liveCount = data.filter((p) => !p.redeemable).length;
      const resolvedCount = data.length - liveCount;
      connStatus.textContent = data.length
        ? `Живых позиций: ${liveCount}` + (resolvedCount ? `, резолвнуто и ждёт redeem: ${resolvedCount}` : "")
        : "Открытых позиций не найдено для этого адреса.";
    } catch (err) {
      connStatus.classList.add("err");
      connStatus.textContent = "Ошибка: " + err.message;
      positionsList.innerHTML = "";
    } finally {
      fetchBtn.disabled = false;
    }
  }

  function renderPositions(positions) {
    // Резолвнутые-но-не-заредимленные позиции — не "живые" в смысле
    // цепочки переката: показываем их, но приглушённо и с бейджем, а не
    // вперемешку с реально открытыми.
    const sorted = [...positions].sort((a, b) => (a.redeemable ? 1 : 0) - (b.redeemable ? 1 : 0));

    positionsList.innerHTML = "";
    sorted.forEach((p) => {
      const div = document.createElement("div");
      div.className = "position-row" + (p.redeemable ? " resolved" : "");
      const badge = p.redeemable
        ? '<span class="badge-redeemable" title="Рынок резолвнулся, но выигрыш ещё не забран (redeem) — не считается живой позицией">резолвнуто · ждёт redeem</span>'
        : "";
      div.innerHTML = `
        <div class="pos-main">
          <div class="pos-title">${p.title || "—"} — ${p.outcome || "?"} ${badge}</div>
          <div class="pos-sub">${(p.size || 0).toFixed(2)} шт. · вход ${pct(p.avgPrice)} · тек. цена ${pct(p.curPrice)} · вложено ${formatMoney(p.initialValue)}</div>
        </div>
        <button class="btn-accent" data-load-slug="${p.slug || ""}">Загрузить</button>
      `;
      div.querySelector("button").addEventListener("click", () => loadPositionIntoChain(p));
      positionsList.appendChild(div);
    });
  }

  function loadPositionIntoChain(p) {
    strategyNameEl.value = p.title || strategyNameEl.value;
    initialCapitalEl.value = (p.initialValue || 0).toFixed(2);

    if (rows.length > 0) {
      rows[0].asset = p.asset || null;
      rows[0].liveNote = null;
      if (p.oppositeOutcome) {
        rows[0].matchLabel = `${p.outcome} vs ${p.oppositeOutcome}`;
      }

      if (p.redeemable) {
        // Рынок реально резолвнулся -- коэффициент считаем из ФАКТИЧЕСКОГО
        // исхода (currentValue/initialValue), а не оставляем дефолтные
        // 0.85/"Завершено" от пустой строки. initialValue=0 -- защита от
        // деления на ноль (не должно случаться у реальной позиции).
        const realized = p.initialValue ? (p.currentValue - p.initialValue) / p.initialValue : 0;
        rows[0].coefficient = Math.round(realized * 10000) / 10000;
        rows[0].status = STATUS.COMPLETED;
      } else {
        // Рынок ещё не резолвнулся -- реального исхода нет, коэффициент
        // фиктивным не оставляем, статус явно "В ожидании".
        rows[0].coefficient = 0;
        rows[0].status = STATUS.PENDING;
      }
    }

    render();
    connStatus.classList.remove("err");
    const outcomeNote = p.redeemable
      ? `фактический результат: ${(rows[0].coefficient * 100).toFixed(1)}%`
      : "рынок ещё не резолвнулся, коэффициент введите вручную после исхода";
    connStatus.textContent = `Загружено: "${p.title}" (${p.outcome}) → строка 1 привязана к живому ордербоку, ${outcomeNote}.`;

    if (p.outcome && p.oppositeOutcome) {
      lookupPandaScoreTournament(p.outcome, p.oppositeOutcome);
    }
  }

  async function lookupPandaScoreTournament(teamA, teamB) {
    bracketStatus.classList.remove("err");
    bracketStatus.textContent = "Ищу турнир на PandaScore по загруженной позиции...";
    try {
      const url = `/api/pandascore-match?team_a=${encodeURIComponent(teamA)}&team_b=${encodeURIComponent(teamB)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "ошибка поиска турнира");
      if (data.tournament_id) {
        bracketTournamentIdEl.value = String(data.tournament_id);
        await fetchBracket();
      } else {
        bracketStatus.textContent = "Не удалось найти турнир на PandaScore по этой позиции — укажите Tournament ID вручную.";
      }
    } catch (err) {
      bracketStatus.classList.add("err");
      bracketStatus.textContent = "Ошибка поиска турнира: " + err.message;
    }
  }

  async function fetchLiveBook(rowId) {
    const row = rows.find((r) => r.id === rowId);
    if (!row || !row.asset) return;
    try {
      const resp = await fetch(`/api/book?token_id=${encodeURIComponent(row.asset)}`);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "ошибка книги");
      row.liveNote = data.bid !== null && data.ask !== null
        ? `bid ${pct(data.bid)} / ask ${pct(data.ask)}`
        : "книга пуста";
    } catch (err) {
      row.liveNote = "ошибка: " + err.message;
    }
    render();
  }

  fetchBtn.addEventListener("click", fetchPositions);

  // ---------- PandaScore: сетка турнира (все потенциальные ноги) ----------

  const bracketStatus = $("bracketStatus");
  const bracketList = $("bracketList");
  const bracketTournamentIdEl = $("bracketTournamentId");
  const fetchBracketBtn = $("fetchBracketBtn");

  const savedTournamentId = localStorage.getItem("evhedge_tournament_id");
  if (savedTournamentId) bracketTournamentIdEl.value = savedTournamentId;

  function fmtScheduled(iso) {
    if (!iso) return "время неизвестно";
    const d = new Date(iso);
    return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
  }

  async function fetchBracket() {
    const tournamentId = bracketTournamentIdEl.value.trim();
    if (!tournamentId) {
      bracketStatus.textContent = "Введите PandaScore Tournament ID";
      bracketStatus.classList.add("err");
      return;
    }
    localStorage.setItem("evhedge_tournament_id", tournamentId);
    bracketStatus.classList.remove("err");
    bracketStatus.textContent = "Загрузка...";
    fetchBracketBtn.disabled = true;
    try {
      const resp = await fetch(`/api/bracket?tournament_id=${encodeURIComponent(tournamentId)}`);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "неизвестная ошибка");
      renderBracket(data);
      const known = data.filter((m) => !m.tbd).length;
      bracketStatus.textContent = `Всего ног в сетке: ${data.length} (известных пар: ${known}, ещё TBD: ${data.length - known})`;
    } catch (err) {
      bracketStatus.classList.add("err");
      bracketStatus.textContent = "Ошибка: " + err.message;
      bracketList.innerHTML = "";
    } finally {
      fetchBracketBtn.disabled = false;
    }
  }

  function renderBracket(matches) {
    // Сначала известные пары, потом TBD-слоты; внутри группы -- по времени старта.
    const sorted = [...matches].sort((a, b) => {
      if (a.tbd !== b.tbd) return a.tbd ? 1 : -1;
      return (a.scheduled_at || "").localeCompare(b.scheduled_at || "");
    });

    bracketList.innerHTML = "";
    sorted.forEach((m) => {
      const div = document.createElement("div");
      div.className = "position-row" + (m.tbd ? " resolved" : "");
      const roundLabel = (m.name || "").split(":")[0]; // "Round of 32 match 1"
      const badge = m.tbd
        ? '<span class="badge-redeemable" style="color:var(--muted);border-color:var(--border);" title="Соперники ещё не определены">TBD</span>'
        : "";
      div.innerHTML = `
        <div class="pos-main">
          <div class="pos-title">${escapeHtml(m.team_a)} vs ${escapeHtml(m.team_b)} ${badge}</div>
          <div class="pos-sub">${escapeHtml(roundLabel)} · Bo${m.best_of || "?"} · ${fmtScheduled(m.scheduled_at)}</div>
        </div>
        <button class="btn-accent" ${m.tbd ? "disabled" : ""}>Добавить как этап</button>
      `;
      const btn = div.querySelector("button");
      if (!m.tbd) btn.addEventListener("click", () => addBracketMatchAsStage(m, roundLabel));
      bracketList.appendChild(div);
    });
  }

  function addBracketMatchAsStage(m, roundLabel) {
    rows.push({
      id: nextId++, coefficient: 0, status: STATUS.PENDING, asset: null, liveNote: null,
      matchLabel: `${m.team_a} vs ${m.team_b} (${roundLabel})`,
    });
    render();
    bracketStatus.classList.remove("err");
    bracketStatus.textContent = `Добавлено как новый этап: ${m.team_a} vs ${m.team_b}.`;
  }

  fetchBracketBtn.addEventListener("click", fetchBracket);

  render();
  if (savedAddress) fetchPositions();
  if (savedTournamentId) fetchBracket();
</script>
</body>
</html>
